<html lang="en">
<head>

    <style>
        :root {

        }

        body {

            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;

            min-height: 100vh;
        }

        .container {
            margin: 0 auto;
            padding: 4rem 2rem;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 1s ease-out;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary);

        .brand svg {

        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0 0 1rem 0;
            letter-spacing: -0.05em;

            -webkit-text-fill-color: transparent;

        .subtitle {
            font-size: 1.15rem;
            color: var(--muted-text);
            max-width: 700px;
            margin: 0 auto;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 2.5rem auto 4rem;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            font-size: 1.1rem;
            border-radius: 99px;
            border: 1px solid var(--card-border);
            background: rgba(24, 24, 27, 0.8);
            color: var(--text-color);

            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.15);

            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-text);
            width: 22px;
            height: 22px;

            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 1s ease-out backwards;
        }

            transform: translateY(-3px);
            box-shadow: 0 12px 40px -10px rgba(0,0,0,0.6), 0 0 25px -10px var(--primary-glow);
            border-color: rgba(255, 255, 255, 0.15);
        }

            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 1.5rem 0;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .accordion {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .accordion-item {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .accordion-header {
            width: 100%;
            text-align: left;
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
            font-family: inherit;
        }

        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .accordion-header::after {
            content: '+';
            font-size: 1.8rem;
            font-weight: 300;
            transition: transform 0.3s ease;
            color: var(--primary);
        }

        .accordion-item.active .accordion-header::after {
            transform: rotate(45deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.4s ease;
        }

        .accordion-item.active .accordion-content {
            max-height: 2000px; /* Large enough to hold rich content */
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

            margin-bottom: 1.5rem;
        }

        .content-section:last-child {
            margin-bottom: 0;
        }

        .content-section h4 {
            color: #fff;
            margin: 0 0 0.5rem 0;
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .content-section p {
            margin: 0 0 1rem 0;
            color: var(--muted-text);
            font-size: 1rem;
        }

        .content-section ul {
            margin: 0 0 1rem 0;
            padding-left: 1.5rem;
            color: var(--muted-text);
        }

        .content-section li {
            margin-bottom: 0.5rem;
        }

        .content-section li strong {
            color: #e4e4e7;
        }

            display: inline-flex;
            align-items: center;

            color: #4ade80;

            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

            from { opacity: 0; transform: translateY(20px); }

        .category-card:nth-child(5) { animation-delay: 0.5s; }

</head>

    function renderTopics(query = "") {
        const container = document.getElementById('content');
        container.innerHTML = '';

        const lowerQuery = query.toLowerCase();

        const filtered = helpTopics.map(topic => {
            return {
                ...topic,
                items: topic.items.filter(item => 
                    item.title.toLowerCase().includes(lowerQuery) || 
                    item.content.toLowerCase().includes(lowerQuery)
                )
            };
        }).filter(topic => topic.items.length > 0);

        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align: center; color: var(--muted-text); padding: 4rem; font-size: 1.2rem;">No documentation found matching "${query}"</div>`;
            return;
        }

        filtered.forEach(topic => {
            const card = document.createElement('div');
            card.className = 'category-card';

            const header = document.createElement('h2');
            header.className = 'category-title';
            header.innerHTML = `${topic.icon} ${topic.category}`;
            card.appendChild(header);

            const accordion = document.createElement('div');
            accordion.className = 'accordion';

            topic.items.forEach(item => {
                const accItem = document.createElement('div');
                accItem.className = 'accordion-item';

                const accHeader = document.createElement('button');
                accHeader.className = 'accordion-header';
                accHeader.textContent = item.title;

                const accContent = document.createElement('div');
                accContent.className = 'accordion-content';
                accContent.innerHTML = item.content;

                accHeader.addEventListener('click', () => {
                    const isActive = accItem.classList.contains('active');
                    Array.from(accordion.children).forEach(child => child.classList.remove('active'));
                    if (!isActive) {
                        accItem.classList.add('active');
                    }
                });

                accItem.appendChild(accHeader);
                accItem.appendChild(accContent);
                accordion.appendChild(accItem);
            });

            card.appendChild(accordion);
            container.appendChild(card);
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderTopics(e.target.value);
    });

    renderTopics();
